  <!-- Load BibTeX parser first -->
  <script src="https://unpkg.com/bibtex-parse-js@1.0.0/bibtexParse.min.js"></script>

  <script>
    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function cleanTitle(title) {
      return String(title || "Untitled").replace(/[{}]/g, "");
    }

    function formatAuthors(auth) {
      return String(auth || "").replace(/\s+and\s+/g, ", ");
    }

    function getYear(entry) {
      const y = entry.entryTags && entry.entryTags.year ? parseInt(entry.entryTags.year, 10) : 0;
      return Number.isFinite(y) ? y : 0;
    }

    async function loadBib() {
      const container = document.getElementById("pubs");

      // Distinguish “parser not loaded” from “bib not found”
      if (typeof window.bibtexParse === "undefined" || typeof window.bibtexParse.toJSON !== "function") {
        throw new Error("bibtex-parse-js did not load (bibtexParse is undefined).");
      }

      // Use absolute path so it works from any page depth
      const bibPath = "/assets/publications.bib";
      const res = await fetch(bibPath, { cache: "no-store" });

      if (!res.ok) {
        throw new Error(`Could not fetch ${bibPath} (HTTP ${res.status}).`);
      }

      const text = await res.text();
      const entries = window.bibtexParse.toJSON(text);

      // newest first
      entries.sort((a, b) => getYear(b) - getYear(a));

      // group by year (descending)
      const groups = new Map();
      for (const e of entries) {
        const y = getYear(e) || "—";
        if (!groups.has(y)) groups.set(y, []);
        groups.get(y).push(e);
      }

      const years = Array.from(groups.keys()).sort((a, b) => {
        const aa = a === "—" ? -1 : parseInt(a, 10);
        const bb = b === "—" ? -1 : parseInt(b, 10);
        return bb - aa;
      });

      let html = "";
      for (const year of years) {
        const items = groups.get(year);
        html += `<h2>${escapeHtml(year)}</h2><ol class="pubs">`;

        for (const e of items) {
          const t = e.entryTags || {};
          const title = cleanTitle(t.title);
          const authors = formatAuthors(t.author);
          const venue = t.journal || t.booktitle || t.publisher || "";
          const link = t.url
            ? ` <a href="${escapeHtml(t.url)}" target="_blank" rel="noopener">link</a>`
            : "";

          html += `<li>${authors ? escapeHtml(authors) + ". " : ""}<em>${escapeHtml(title)}</em>${venue ? ". " + escapeHtml(venue) : ""}${link}</li>`;
        }

        html += `</ol>`;
      }

      container.innerHTML = html || "No publications found.";
    }

    loadBib().catch(err => {
      const container = document.getElementById("pubs");
      container.innerHTML =
        `<p><strong>Could not load publications.</strong></p>
         <p class="small">${escapeHtml(err.message)}</p>
         <p class="small">Tip: try opening <code>/assets/publications.bib</code> directly to confirm it is publicly accessible.</p>`;
      console.error(err);
    });
  </script>
