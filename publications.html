<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Publications – Adrien Doerig</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <div>
        <h1>Publications</h1>
        <p class="links">
          <a href="index.html">Home</a>
          <span>·</span>
          <a href="research.html">Research</a>
          <span>·</span>
          <a href="https://scholar.google.com/citations?user=YA6DPIcAAAAJ" target="_blank">Google Scholar</a>
        </p>
      </div>
    </header>

    <main>
      <section>
        <p class="small">
          This list is generated from a BibTeX export (update by re-exporting from Google Scholar).
        </p>
        <div id="pubs">Loading…</div>
      </section>
    </main>
  </div>

  <script src="https://unpkg.com/bibtex-parse-js@1.0.0/bibtexParse.min.js"></script>
  <script>
    async function loadBib() {
      const res = await fetch("assets/publications.bib", { cache: "no-store" });
      if (!res.ok) throw new Error("Could not load publications.bib");
      const text = await res.text();
      const entries = bibtexParse.toJSON(text);

      // helper: year for sorting
      const getYear = (e) => {
        const y = e.entryTags && e.entryTags.year ? parseInt(e.entryTags.year, 10) : 0;
        return Number.isFinite(y) ? y : 0;
      };

      // sort newest first
      entries.sort((a,b) => getYear(b) - getYear(a));

      // group by year
      const groups = new Map();
      for (const e of entries) {
        const y = getYear(e) || "—";
        if (!groups.has(y)) groups.set(y, []);
        groups.get(y).push(e);
      }

      const container = document.getElementById("pubs");
      let html = "";

      for (const [year, items] of groups) {
        html += `<h2>${year}</h2><ol class="pubs">`;
        for (const e of items) {
          const t = e.entryTags || {};
          const title = t.title ? t.title.replace(/[{}]/g,"") : "Untitled";
          const authors = (t.author || "").replace(/\s+and\s+/g, ", ");
          const venue = t.journal || t.booktitle || t.publisher || "";
          const link = t.url ? ` <a href="${t.url}" target="_blank">link</a>` : "";
          html += `<li>${authors ? authors + ". " : ""}<em>${title}</em>${venue ? ". " + venue : ""}${link}</li>`;
        }
        html += `</ol>`;
      }

      container.innerHTML = html || "No publications found.";
    }

    loadBib().catch(err => {
      document.getElementById("pubs").textContent =
        "Could not load publications. Make sure assets/publications.bib exists.";
      console.error(err);
    });
  </script>
</body>
</html>
