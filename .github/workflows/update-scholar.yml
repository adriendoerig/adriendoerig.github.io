name: Update Google Scholar record

on:
  schedule:
    # runs at 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Google Scholar record
        uses: sxlllslgh/google-scholar-fetcher@v1
        with:
          google-scholar-id: YA6DPIcAAAAJ
          record-file: assets/record.json

      - name: Commit and push if changed
        run: |
          git add assets/record.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "Auto-update Google Scholar record"
            git push
          fi
